<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Single bold isometric cube - optimized for small sizes -->
  
  <!-- Top face - lightest (aqua) -->
  <path d="M16 4 L28 11 L16 18 L4 11 Z" fill="#33D6B5"/>
  
  <!-- Left face - medium (teal) -->
  <path d="M4 11 L16 18 L16 30 L4 23 Z" fill="#015B77"/>
  
  <!-- Right face - darkest (midnight) -->
  <path d="M16 18 L28 11 L28 23 L16 30 Z" fill="#011F4B"/>
</svg>
